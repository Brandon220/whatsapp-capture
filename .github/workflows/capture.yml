name: WhatsApp Data Capture

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Permiso necesario para clonar el repositorio
    
    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v4
      # No es necesario especificar token para repositorios públicos
    
    - name: ⚙️ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: 📦 Instalar dependencias
      run: npm install
    
    - name: 🚀 Ejecutar captura
      run: node capture.js
