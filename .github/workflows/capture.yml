name: WhatsApp Data Capture

on:
  schedule:
    - cron: '0 */2 * * *'  # Cada 2 horas
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v4  # ← Cambiado a v4 (más reciente)
    
    - name: ⚙️ Configurar Node.js
      uses: actions/setup-node@v4  # ← Cambiado a v4
      with:
        node-version: '22'  # ← Cambiado a Node.js 22 (más estable)
    
    - name: 📦 Instalar dependencias
      run: npm install
    
    - name: 🚀 Ejecutar captura
      run: node capture.js
